services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - blaeu_data:/data
    environment:
      - DATA_DIR=/data
      - BLAEU_ALLOW_REGISTRATION=${BLAEU_ALLOW_REGISTRATION:-false}
      - BLAEU_WORKERS=${BLAEU_WORKERS:-2}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

volumes:
  blaeu_data:
    driver: local
